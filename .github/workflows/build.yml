name: Build

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Qt-Systembibliotheken (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pytest tests/ -q

      - name: Build
        run: python build.py

      - name: Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.dmg
          if-no-files-found: warn

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Release-Notes aus CHANGELOG extrahieren
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" {flag=1; next}
            flag && /^## \[/ {flag=0}
            flag && $0 != "---" {print}
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "Siehe CHANGELOG.md für Details." > release_notes.md
          fi

      - uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: artifacts/*
